name: tests

on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: poetry install
        
      - name: Run tests
        run: poetry run pytest twin_twitter_app/tests
      - name: Run mypy
        run: poetry run mypy twin_twitter_app/
      - name: Check black formatting
        run: poetry run black --diff --check twin_twitter_app/
      - name: Check imports order
        run: poetry run isort --check-only --diff twin_twitter_app/
      - name: Run flake8
        run: poetry run flake8 twin_twitter_app/
